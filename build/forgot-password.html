<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Dream Wave</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .reset-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 450px;
            width: 100%;
        }

        .reset-box h2 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .reset-box p {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .reset-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .reset-btn:hover {
            transform: translateY(-2px);
        }

        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }

        .back-to-login a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-box">
            <h2>🔐 Reset Password</h2>
            <p>Enter your email and new password</p>

            <div id="message"></div>

            <form id="resetForm" onsubmit="resetPassword(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email">
                </div>

                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" required placeholder="Enter new password" minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" required placeholder="Confirm new password" minlength="6">
                </div>

                <button type="submit" class="reset-btn">Reset Password</button>
            </form>

            <div class="back-to-login">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        async function resetPassword(event) {
            event.preventDefault();

            var email = document.getElementById('email').value;
            var newPassword = document.getElementById('newPassword').value;
            var confirmPassword = document.getElementById('confirmPassword').value;
            var messageDiv = document.getElementById('message');

            messageDiv.innerHTML = '';

            if (newPassword !== confirmPassword) {
                messageDiv.innerHTML = '<div class="message error">Passwords do not match!</div>';
                return;
            }

            try {
                var res = await fetch(API_URL + '/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, newPassword: newPassword })
                });

                var data = await res.json();

                if (res.ok) {
                    messageDiv.innerHTML = '<div class="message success">Password reset successful! Redirecting to login...</div>';
                    setTimeout(function() { window.location.href = 'login.html'; }, 2000);
                } else {
                    messageDiv.innerHTML = '<div class="message error">' + (data.message || 'Failed to reset password') + '</div>';
                }
            } catch (err) {
                messageDiv.innerHTML = '<div class="message error">Error connecting to server. Please try again.</div>';
            }
        }
    </script>
</body>
</html>
