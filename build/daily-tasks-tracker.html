<!-- Daily Tasks Tracker Interface (add to krishna.html or use as standalone) -->

<style>
.daily-tasks-panel {
  background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(167,139,250,0.1));
  border: 1px solid rgba(167,139,250,0.3);
  border-radius: 14px;
  padding: 18px;
  margin: 14px 16px 0;
}

.tasks-header {
  font-size: 0.9rem;
  font-weight: 700;
  color: #f5c842;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.task-item {
  display: flex;
  align-items: center;
  padding: 12px;
  background: rgba(0,0,0,0.2);
  border-radius: 8px;
  margin-bottom: 10px;
  gap: 12px;
  transition: all 0.3s ease;
}

.task-item:hover {
  background: rgba(245,200,66,0.1);
}

.task-checkbox {
  width: 24px;
  height: 24px;
  border: 2px solid #8878b0;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s ease;
}

.task-checkbox:hover {
  border-color: #f5c842;
  background: rgba(245,200,66,0.1);
}

.task-checkbox.completed {
  background: #f5c842;
  border-color: #f5c842;
  color: #0a0a1a;
  font-weight: bold;
}

.task-details {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.task-name {
  font-size: 0.9rem;
  color: #e8e0d0;
  font-weight: 500;
}

.task-name.completed {
  color: #8878b0;
  text-decoration: line-through;
}

.task-desc {
  font-size: 0.75rem;
  color: #8878b0;
}

.task-xp {
  font-size: 0.8rem;
  font-weight: 700;
  color: #f5c842;
  white-space: nowrap;
}

.tasks-summary {
  display: flex;
  justify-content: space-between;
  padding: 10px 12px;
  background: rgba(245,200,66,0.05);
  border-radius: 8px;
  margin-top: 12px;
  font-size: 0.85rem;
  color: #c8c0e0;
}

.complete-day-btn {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  background: linear-gradient(135deg, #f5c842, #ffd700);
  border: none;
  border-radius: 8px;
  color: #0a0a1a;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.complete-day-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 15px rgba(245,200,66,0.4);
}

.complete-day-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>

<script>
// Daily Tasks Tracker
const DAILY_TASKS = [
  { id: 1, name: "Morning Meditation", desc: "15 min guided meditation", xp: 10 },
  { id: 2, name: "Read Sacred Text", desc: "Read Bhagavad Gita or similar", xp: 10 },
  { id: 3, name: "Mindful Exercise", desc: "Yoga, Running, or Gym", xp: 10 },
  { id: 4, name: "Practice Discipline", desc: "Complete primary goal task", xp: 10 },
  { id: 5, name: "Help Others", desc: "Volunteer or assist someone", xp: 10 },
  { id: 6, name: "Evening Reflection", desc: "Journal or reflect on the day", xp: 10 }
];

function initDailyTasks() {
  const today = new Date().toDateString();
  const stored = localStorage.getItem('daily_tasks_' + today);
  if (!stored) {
    const tasks = DAILY_TASKS.map(t => ({ ...t, completed: false }));
    localStorage.setItem('daily_tasks_' + today, JSON.stringify(tasks));
  }
}

function getDailyTasks() {
  const today = new Date().toDateString();
  return JSON.parse(localStorage.getItem('daily_tasks_' + today) || '[]');
}

function saveDailyTasks(tasks) {
  const today = new Date().toDateString();
  localStorage.setItem('daily_tasks_' + today, JSON.stringify(tasks));
}

function toggleTask(taskId) {
  const tasks = getDailyTasks();
  const task = tasks.find(t => t.id === taskId);
  if (task) {
    task.completed = !task.completed;
    saveDailyTasks(tasks);
    // Award XP if completed
    if (task.completed) {
      GAMIFICATION.addXP(task.xp, task.name);
      showGamificationMessage(`✅ ${task.name} | +${task.xp} XP`);
    }
    renderDailyTasks();
    updateGamificationWidget();
  }
}

function completeAllDailyTasks_UI() {
  const tasks = getDailyTasks();
  const allCompleted = tasks.every(t => t.completed);
  if (allCompleted) {
    GAMIFICATION.addXP(50, 'Daily Challenge Bonus');
    GAMIFICATION.updateStreak(100, 100);
    showGamificationMessage('🎉 Daily Challenge Complete! +50 XP Bonus!');
    updateGamificationWidget();
  }
}

function renderDailyTasks() {
  const tasks = getDailyTasks();
  const completed = tasks.filter(t => t.completed).length;
  const total = tasks.length;
  
  let html = '<div class="daily-tasks-panel"><div class="tasks-header">📋 Today\'s Tasks (' + completed + '/' + total + ')</div>';
  
  tasks.forEach(task => {
    html += '<div class="task-item">';
    html += '<div class="task-checkbox' + (task.completed ? ' completed' : '') + '" onclick="toggleTask(' + task.id + ')">' + (task.completed ? '✓' : '') + '</div>';
    html += '<div class="task-details">';
    html += '<div class="task-name' + (task.completed ? ' completed' : '') + '">' + task.name + '</div>';
    html += '<div class="task-desc">' + task.desc + '</div>';
    html += '</div>';
    html += '<div class="task-xp">+' + task.xp + ' XP</div>';
    html += '</div>';
  });
  
  html += '<div class="tasks-summary">';
  html += '<span>Completed: ' + completed + '/' + total + '</span>';
  html += '<span>XP Earned: ' + (completed * 10) + '/' + (total * 10) + '</span>';
  html += '</div>';
  
  if (completed === total && total > 0) {
    html += '<button class="complete-day-btn" onclick="completeAllDailyTasks_UI()">🎉 Complete Day & Earn Bonus</button>';
  }
  
  html += '</div>';
  
  const container = document.getElementById('daily-tasks-container');
  if (container) {
    container.innerHTML = html;
  }
}

// Initialize on load
window.addEventListener('DOMContentLoaded', function() {
  initDailyTasks();
  renderDailyTasks();
});
</script>
