<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Dream Wave</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body{background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;}
    .auth-wrap{width:100%;max-width:440px;padding:20px;}
    .auth-logo{text-align:center;margin-bottom:28px;}
    .auth-logo a{font-size:1.8rem;font-weight:800;color:white;text-decoration:none;}
    .auth-logo span{color:#a78bfa;}
    .glass-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px;box-shadow:0 25px 50px rgba(0,0,0,0.4);}
    .glass-card h2{color:#fff;font-size:1.6rem;font-weight:700;margin-bottom:4px;}
    .glass-card .sub{color:rgba(255,255,255,0.45);font-size:0.88rem;margin-bottom:26px;}
    .login-tabs{display:flex;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:4px;margin-bottom:22px;gap:4px;}
    .login-tab{flex:1;padding:9px;border:none;border-radius:9px;background:transparent;color:rgba(255,255,255,0.45);font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;}
    .login-tab.active{background:rgba(124,58,237,0.3);color:#c4b5fd;}
    .field{margin-bottom:16px;}
    .field label{display:block;color:rgba(255,255,255,0.65);font-size:0.82rem;font-weight:600;margin-bottom:7px;}
    .input-wrap{position:relative;}
    .input-prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#a78bfa;font-weight:700;font-size:1rem;pointer-events:none;}
    .field input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);border-radius:12px;color:#fff;font-size:0.92rem;outline:none;transition:border 0.2s;box-sizing:border-box;}
    .field input.has-prefix{padding-left:32px;}
    .field input::placeholder{color:rgba(255,255,255,0.28);}
    .field input:focus{border-color:#a78bfa;background:rgba(167,139,250,0.08);}
    .hint{color:rgba(255,255,255,0.28);font-size:0.75rem;margin-top:5px;}
    .err{color:#f87171;font-size:0.83rem;margin-bottom:14px;display:none;padding:10px 14px;background:rgba(248,113,113,0.1);border-radius:8px;border:1px solid rgba(248,113,113,0.3);}
    .btn-auth{width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:opacity 0.2s,transform 0.2s;}
    .btn-auth:hover{opacity:0.9;transform:translateY(-1px);}
    .btn-auth:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
    .auth-links{text-align:center;margin-top:18px;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;}
    .auth-links a{color:#a78bfa;text-decoration:none;font-size:0.88rem;}
    .aaid-info{display:flex;align-items:center;gap:8px;background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);border-radius:10px;padding:10px 14px;margin-bottom:18px;font-size:0.82rem;color:#c4b5fd;}
  </style>
</head>
<body>
  <script>
    // Top: auto redirect if already logged in
    const u = localStorage.getItem('user');
    if (u) {
      window.location.href = 'ambition.html';
    }
  </script>
  <div class="auth-wrap">
    <div class="auth-logo"><a href="index.html">🌊 Dream<span>Wave</span></a></div>
    <div class="glass-card">
      <h2>Welcome back</h2>
      <p class="sub">Sign in to continue your journey</p>

      <div class="login-tabs">
        <button class="login-tab active" id="tabEmail" onclick="switchMode('email')">📧 Email</button>
        <button class="login-tab" id="tabAaId" onclick="switchMode('aaid')">🪪 AA ID</button>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div id="emailField" class="field">
          <label>Email Address</label>
          <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
        </div>

        <div id="aaidField" class="field" style="display:none">
          <label>AA ID</label>
          <div class="aaid-info">🪪 Your unique Dream Wave handle — set it in your Profile page</div>
          <div class="input-wrap">
            <span class="input-prefix">@</span>
            <input type="text" id="aaidInput" class="has-prefix" placeholder="yourhandle" autocomplete="username" autocapitalize="none">
          </div>
          <div class="hint">Enter your AA ID without the @ symbol</div>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <div id="errorMessage" class="err"></div>
        <button type="submit" class="btn-auth" id="submitBtn">Sign In</button>
      </form>

      <div class="auth-links">
        <a href="forgot-password.html">Forgot password?</a>
        <a href="register.html">Create account</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    let loginMode = 'email';

    function switchMode(mode) {
      loginMode = mode;
      document.getElementById('tabEmail').classList.toggle('active', mode === 'email');
      document.getElementById('tabAaId').classList.toggle('active', mode === 'aaid');
      document.getElementById('emailField').style.display = mode === 'email' ? 'block' : 'none';
      document.getElementById('aaidField').style.display = mode === 'aaid' ? 'block' : 'none';
      document.getElementById('errorMessage').style.display = 'none';
    }

    async function handleLogin(e) {
      if (e) e.preventDefault();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const errorDiv = document.getElementById('errorMessage');
      let identifier = '';
      if (loginMode === 'email') {
        identifier = document.getElementById('emailInput').value.trim();
        if (!identifier) {
          showError('Please enter your email');
          return;
        }
      } else {
        identifier = document.getElementById('aaidInput').value.trim().replace(/^@/, '').toLowerCase() + '@aaai.app';
        if (!identifier) {
          showError('Please enter your AA ID');
          return;
        }
      }
      if (!password) {
        showError('Please enter your password');
        return;
      }
      errorDiv.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        // Firebase Auth login
        const { signInWithEmailAndPassword } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
        const { auth } = await import('./firebase.js');
        await signInWithEmailAndPassword(auth, identifier, password);
        const user = auth.currentUser;

        // Save user with a single localStorage key
        localStorage.setItem('user', JSON.stringify({ email: user.email }));

        window.location.href = 'ambition.html';
      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function showError(msg) {
      const e = document.getElementById('errorMessage');
      e.textContent = msg;
      e.style.display = 'block';
    }
  </script>
</body>
</html>
