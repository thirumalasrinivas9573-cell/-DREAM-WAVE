<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Career Roadmap Report - Dream Wave</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .report-container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .report-header { text-align: center; margin-bottom: 30px; }
    .report-content { line-height: 1.6; white-space: pre-line; }
    .back-btn { display: inline-block; margin-top: 20px; padding: 10px 20px; background: #7c3aed; color: white; text-decoration: none; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="report-container">
    <div class="report-header">
      <h1>Your Personalized Career Roadmap</h1>
      <p>Generated by Krishna AI</p>
    </div>
    <div class="report-content" id="reportContainer">Loading report...</div>
    <a href="dashboard.html" class="back-btn">Back to Dashboard</a>
  </div>

  <script src="config.js"></script>
  <script type="module">
    import API_URL from './config.js';
    window.API_URL = API_URL;
  </script>
  <script>
    window.onload = function () {
      const report = localStorage.getItem('reportData');
      console.log('REPORT DATA:', report);
      if (!report) {
        document.getElementById('reportContainer').innerText = 'No report found';
        return;
      }
      document.getElementById('reportContainer').innerText = report;
    }
  </script>
</body>
</html>
