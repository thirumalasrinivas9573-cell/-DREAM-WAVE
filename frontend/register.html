<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Dream Wave</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">🌊 Dream Wave</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Start Your Journey</h2>
      <p class="auth-subtitle">Create an account to begin learning</p>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" required placeholder="John Doe">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••" minlength="6">
        </div>

        <div id="errorMessage" class="error-message"></div>

        <button type="submit" class="btn-primary btn-full">Create Account</button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');
      const btn = e.target.querySelector('button[type="submit"]');

      errorDiv.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Creating account...';

      try {
        const res = await fetch(API_URL + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        } else {
          errorDiv.textContent = data.message || 'Registration failed';
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        errorDiv.textContent = 'Cannot connect to server. Make sure the backend is running.';
        errorDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
