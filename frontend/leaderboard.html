<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Dream Wave</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .lb-container { max-width: 900px; margin: 80px auto 40px; padding: 20px; }
        .lb-header { text-align: center; margin-bottom: 40px; }
        .lb-header h1 { font-size: 2.5rem; color: #667eea; }
        .lb-header p { color: #666; margin-top: 8px; }
        .my-rank-card { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border-radius: 15px; padding: 25px; margin-bottom: 30px; display: flex; align-items: center; gap: 20px; }
        .my-rank-num { font-size: 3rem; font-weight: 700; }
        .my-rank-info h3 { font-size: 1.2rem; margin-bottom: 5px; }
        .my-rank-info p { opacity: 0.85; font-size: 0.9rem; }
        .lb-table { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        .lb-row { display: grid; grid-template-columns: 60px 1fr 120px 100px 80px; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
        .lb-row:hover { background: #f8f9ff; }
        .lb-row.header { background: #667eea; color: white; font-weight: 600; font-size: 0.85rem; }
        .lb-row.header:hover { background: #667eea; }
        .lb-row.top1 { background: linear-gradient(135deg, #fff9e6, #fff3cc); }
        .lb-row.top2 { background: linear-gradient(135deg, #f5f5f5, #ebebeb); }
        .lb-row.top3 { background: linear-gradient(135deg, #fff4ee, #ffe8d6); }
        .lb-row.me { background: #f0f4ff; border-left: 4px solid #667eea; }
        .rank-badge { font-size: 1.4rem; text-align: center; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1rem; }
        .user-name { font-weight: 600; color: #333; font-size: 0.95rem; }
        .user-ambition { color: #666; font-size: 0.8rem; }
        .points-val { font-weight: 700; color: #667eea; font-size: 1rem; }
        .streak-val { color: #f59e0b; font-weight: 600; }
        .badges-val { font-size: 1.1rem; }
        body.dark-mode .lb-table { background: #1e293b; }
        body.dark-mode .lb-row { border-color: #374151; }
        body.dark-mode .lb-row:hover { background: #0f172a; }
        body.dark-mode .lb-row.top1 { background: #2d2a1a; }
        body.dark-mode .lb-row.top2 { background: #1e1e1e; }
        body.dark-mode .lb-row.top3 { background: #2d1f15; }
        body.dark-mode .lb-row.me { background: #1a1f3a; }
        body.dark-mode .user-name { color: #f3f4f6; }
        body.dark-mode .user-ambition { color: #9ca3af; }
        body.dark-mode .lb-header p { color: #9ca3af; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="dashboard.html" class="nav-brand">🌊 Dream Wave</a>
            <div class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="careers.html">Careers</a>
                <a href="study.html">Study</a>
                <a href="leaderboard.html" style="color:#667eea;font-weight:700">Leaderboard</a>
                <a href="ai-assistant.html">AI</a>
                <a href="community.html">Community</a>
                <a href="profile.html" id="profileLink">Profile</a>
                <button onclick="logout()" class="btn-secondary">Logout</button>
                <button class="theme-toggle" onclick="toggleTheme()" id="themeToggle">🌙</button>
            </div>
        </div>
    </nav>

    <div class="lb-container">
        <div class="lb-header">
            <h1>🏆 Leaderboard</h1>
            <p>Top learners ranked by points earned through completing tasks</p>
        </div>

        <div class="my-rank-card" id="myRankCard" style="display:none">
            <div class="my-rank-num" id="myRankNum">#-</div>
            <div class="my-rank-info">
                <h3 id="myRankName">You</h3>
                <p id="myRankDetails">0 points • 0 day streak</p>
            </div>
        </div>

        <div class="lb-table">
            <div class="lb-row header">
                <div>Rank</div>
                <div>User</div>
                <div>Points</div>
                <div>Streak</div>
                <div>Badges</div>
            </div>
            <div id="lbBody">
                <div style="text-align:center;padding:40px;color:#666">Loading leaderboard...</div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
    <script>
        checkAuth();

        var rankEmoji = ['🥇', '🥈', '🥉'];
        var rankClass = ['top1', 'top2', 'top3'];

        async function loadLeaderboard() {
            try {
                var token = localStorage.getItem('token');
                var lbRes = await fetch(API_URL + '/progress/leaderboard');
                var statsRes = await fetch(API_URL + '/progress/stats', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                var lb = await lbRes.json();
                var me = await statsRes.json();

                document.getElementById('myRankCard').style.display = 'flex';
                document.getElementById('myRankNum').textContent = '#' + me.rank;
                document.getElementById('myRankName').textContent = me.name;
                document.getElementById('myRankDetails').textContent = (me.points || 0) + ' points • ' + (me.streak || 0) + ' day streak';
                document.getElementById('profileLink').href = 'profile.html?username=' + me.username;

                document.getElementById('lbBody').innerHTML = lb.map(function(u, i) {
                    var isMe = u._id === me._id;
                    var cls = i < 3 ? rankClass[i] : (isMe ? 'me' : '');
                    var badge = i < 3 ? rankEmoji[i] : '#' + (i + 1);
                    var initial = (u.name || 'U')[0].toUpperCase();
                    var ambitionLabel = u.ambition ? u.ambition.replace(/-/g, ' ') : 'Explorer';
                    var badgeIcons = (u.badges || []).slice(0, 3).join(' ') || '—';
                    return '<div class="lb-row ' + cls + '">' +
                        '<div class="rank-badge">' + badge + '</div>' +
                        '<div class="user-info">' +
                            '<div class="user-avatar">' + initial + '</div>' +
                            '<div>' +
                                '<div class="user-name">' + u.name + (isMe ? ' (You)' : '') + '</div>' +
                                '<div class="user-ambition">' + ambitionLabel + '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="points-val">⭐ ' + (u.points || 0) + '</div>' +
                        '<div class="streak-val">🔥 ' + (u.streak || 0) + '</div>' +
                        '<div class="badges-val">' + badgeIcons + '</div>' +
                    '</div>';
                }).join('') || '<div style="text-align:center;padding:40px;color:#666">No users yet. Be the first!</div>';

            } catch (err) {
                document.getElementById('lbBody').innerHTML = '<div style="text-align:center;padding:40px;color:#e74c3c">Failed to load leaderboard</div>';
            }
        }

        loadLeaderboard();
    </script>
</body>
</html>
