<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard - Dream Wave</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .page-wrap { max-width: 860px; margin: 90px auto 60px; padding: 0 20px; }
    .page-title { font-size: 2rem; font-weight: 800; color: #fff; margin-bottom: 6px; }
    .page-sub { color: rgba(255,255,255,0.5); margin-bottom: 30px; }
    .my-rank-card { background: linear-gradient(135deg, #7c3aed, #a78bfa); border-radius: 20px; padding: 24px 28px; margin-bottom: 28px; display: flex; align-items: center; gap: 20px; }
    .my-rank-num { font-size: 3rem; font-weight: 800; color: white; }
    .my-rank-info h3 { color: white; font-size: 1.1rem; margin-bottom: 4px; }
    .my-rank-info p { color: rgba(255,255,255,0.75); font-size: 0.88rem; }
    .lb-table { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; overflow: hidden; }
    .lb-row { display: grid; grid-template-columns: 60px 1fr 100px 120px 100px 80px; align-items: center; padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s; }
    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: rgba(255,255,255,0.03); }
    .lb-row.header { background: rgba(167,139,250,0.1); color: rgba(255,255,255,0.5); font-size: 0.8rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
    .lb-row.top1 { background: rgba(251,191,36,0.07); }
    .lb-row.top2 { background: rgba(156,163,175,0.07); }
    .lb-row.top3 { background: rgba(251,146,60,0.07); }
    .lb-row.me { background: rgba(167,139,250,0.1); border-left: 3px solid #a78bfa; }
    .rank-badge { font-size: 1.3rem; text-align: center; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #7c3aed, #a78bfa); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 0.95rem; flex-shrink: 0; }
    .user-name { color: #e2d9f3; font-weight: 600; font-size: 0.92rem; }
    .user-ambition { color: rgba(255,255,255,0.4); font-size: 0.78rem; }
    .points-val { color: #a78bfa; font-weight: 700; }
    .streak-val { color: #fbbf24; font-weight: 600; }
    .badges-val { font-size: 1rem; }
    .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="dashboard.html" class="nav-brand">🌊 Dream Wave</a>
      <div class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="careers.html">Careers</a>
        <a href="study.html">Study</a>
        <a href="leaderboard.html" class="active">Leaderboard</a>
        <a href="krishna.html">AI</a>
        <a href="community.html">Community</a>
        <button onclick="logout()" class="btn-secondary">Logout</button>
      </div>
    </div>
  </nav>

  <div class="page-wrap">
    <div class="page-title">🏆 Leaderboard</div>
    <p class="page-sub">Top learners ranked by points earned through completing tasks</p>

    <div class="my-rank-card" id="myRankCard" style="display:none">
      <div class="my-rank-num" id="myRankNum">#-</div>
      <div class="my-rank-info">
        <h3 id="myRankName">You</h3>
        <p id="myRankDetails">0 points • 0 day streak</p>
      </div>
    </div>

    <div class="lb-table">
      <div class="lb-row header">
        <div>Rank</div><div>User</div><div>Level</div><div>Points</div><div>Streak</div><div>Badges</div>
      </div>
      <div id="lbBody">
        <div class="empty-state">Loading leaderboard...</div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    checkAuth();
    const rankEmoji = ['🥇','🥈','🥉'];
    const rankClass = ['top1','top2','top3'];

    async function loadLeaderboard() {
      try {
        const token = localStorage.getItem('token');
        const [lbRes, statsRes] = await Promise.all([
          fetch(API_URL + '/progress/leaderboard'),
          fetch(API_URL + '/progress/stats', { headers: { 'Authorization': 'Bearer ' + token } })
        ]);
        const lb = await lbRes.json();
        const me = await statsRes.json();

        document.getElementById('myRankCard').style.display = 'flex';
        document.getElementById('myRankNum').textContent = '#' + (me.rank || '-');
        document.getElementById('myRankName').textContent = me.name || 'You';
        document.getElementById('myRankDetails').textContent = (me.points || 0) + ' points • ' + (me.streak || 0) + ' day streak';

        if (!lb.length) {
          document.getElementById('lbBody').innerHTML = '<div class="empty-state">No users yet. Be the first!</div>';
          return;
        }

        document.getElementById('lbBody').innerHTML = lb.map((u, i) => {
          const isMe = u._id === me._id;
          const cls = i < 3 ? rankClass[i] : (isMe ? 'me' : '');
          const badge = i < 3 ? rankEmoji[i] : '#' + (i + 1);
          return `<div class="lb-row ${cls}">
            <div class="rank-badge">${badge}</div>
            <div class="user-info">
              <div class="user-avatar">${(u.name || 'U')[0].toUpperCase()}</div>
              <div>
                <div class="user-name">${u.name}${isMe ? ' (You)' : ''}</div>
                <div class="user-ambition">${(u.ambition || 'Explorer').replace(/-/g,' ')}${u.aaId ? ' · @'+u.aaId : ''}</div>
              </div>
            </div>
            <div style="color:#a78bfa;font-weight:700;font-size:0.88rem">🧠 Lv.${u.level || Math.max(1, Math.floor((u.points||0)/100)+1)}</div>
            <div class="points-val">⭐ ${u.points || 0}</div>
            <div class="streak-val">🔥 ${u.streak || 0}</div>
            <div class="badges-val">${(u.badges || []).slice(0,2).join(' ') || '—'}</div>
          </div>`;
        }).join('');
      } catch (err) {
        document.getElementById('lbBody').innerHTML = '<div class="empty-state">Failed to load leaderboard</div>';
      }
    }

    loadLeaderboard();
  </script>
</body>
</html>
