<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Mentor Onboarding - Dream Wave</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #07070f; color: #e0e0ff; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(79,70,229,0.1) 0%, transparent 60%); pointer-events: none; z-index: 0; }
    .onboard-wrap { position: relative; z-index: 1; width: 100%; max-width: 640px; }
    .ob-header { text-align: center; margin-bottom: 32px; }
    .ob-logo { font-size: 2.2rem; font-weight: 900; background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 6px; }
    .ob-sub { color: rgba(255,255,255,0.35); font-size: 0.88rem; }
    .chat-window { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; padding: 28px 24px 20px; min-height: 420px; display: flex; flex-direction: column; backdrop-filter: blur(20px); }
    .messages { flex: 1; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; max-height: 420px; padding-right: 4px; margin-bottom: 20px; }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 4px; }
    .msg { display: flex; gap: 10px; align-items: flex-end; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg.user { flex-direction: row-reverse; }
    .msg-av { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
    .msg.ai .msg-av { background: linear-gradient(135deg, #7c3aed, #a78bfa); color: white; }
    .msg.user .msg-av { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }
    .msg-bub { max-width: 78%; padding: 12px 16px; border-radius: 18px; font-size: 0.92rem; line-height: 1.6; }
    .msg.ai .msg-bub { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.88); border-bottom-left-radius: 4px; }
    .msg.user .msg-bub { background: linear-gradient(135deg, #7c3aed, #a855f7); color: #fff; border-bottom-right-radius: 4px; }
    .typing-dots span { display: inline-block; width: 7px; height: 7px; background: rgba(167,139,250,0.6); border-radius: 50%; margin: 0 2px; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform:translateY(0); } 40% { transform:translateY(-6px); } }
    .input-row { display: flex; gap: 10px; align-items: center; }
    .chat-input { flex: 1; background: rgba(255,255,255,0.07); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 14px; color: #fff; padding: 13px 16px; font-size: 0.95rem; outline: none; transition: border 0.2s; font-family: inherit; }
    .chat-input::placeholder { color: rgba(255,255,255,0.25); }
    .chat-input:focus { border-color: #a78bfa; }
    .send-btn { width: 46px; height: 46px; background: linear-gradient(135deg, #7c3aed, #a855f7); border: none; border-radius: 12px; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
    .send-btn:hover { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .chip { padding: 7px 16px; background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.3); border-radius: 50px; color: #c4b5fd; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .chip:hover { background: rgba(124,58,237,0.3); border-color: #a78bfa; }
    .report-card { background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2); border-radius: 16px; padding: 18px 20px; font-size: 0.85rem; line-height: 1.7; color: rgba(255,255,255,0.75); white-space: pre-wrap; max-height: 260px; overflow-y: auto; margin-top: 4px; }
    .progress-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: all 0.3s; }
    .dot.active { background: #a78bfa; transform: scale(1.3); }
    .dot.done { background: #6ee7b7; }
    .already-banner { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
    .already-banner .icon { font-size: 1.8rem; }
    .already-banner h4 { font-size: 0.95rem; font-weight: 700; color: #6ee7b7; }
    .already-banner p { font-size: 0.8rem; color: rgba(255,255,255,0.45); margin-top: 2px; }
    @media (max-width: 480px) { .chat-window { padding: 20px 16px 16px; } .msg-bub { max-width: 88%; font-size: 0.88rem; } }
  </style>
</head>
<body>
<div class="onboard-wrap">
  <div class="ob-header">
    <div class="ob-logo">Dream Wave</div>
    <div class="ob-sub">AI Mentor Onboarding</div>
  </div>
  <div class="already-banner" id="alreadyBanner" style="display:none">
    <div class="icon">&#127919;</div>
    <div>
      <h4>Goal: <span id="existingGoal">-</span></h4>
      <p>You are already set up. You can redo onboarding or go to your mentor dashboard.</p>
    </div>
  </div>
  <div class="progress-dots">
    <div class="dot active" id="dot0"></div>
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
    <div class="dot" id="dot4"></div>
  </div>
  <div class="chat-window">
    <div class="messages" id="messages"></div>
    <div class="chips" id="chips"></div>
    <div class="input-row" id="inputRow">
      <input type="text" class="chat-input" id="chatInput" placeholder="Type your answer..." autocomplete="off" />
      <button class="send-btn" id="sendBtn" onclick="handleSend()">&#10148;</button>
    </div>
  </div>
</div>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
checkAuth();
var token = function() { return localStorage.getItem('token'); };
var state = { step: 0, goal: '', age: '', education: '', skills: '', hoursPerDay: '', wantsReport: false };
var STEPS = [
  { key: 'goal', ask: "Hey there! I am your AI Mentor.\n\nWhat is your dream career goal?", placeholder: 'e.g. Software Engineer, Doctor, YouTuber...' },
  { key: 'age', ask: function(s) { return "That is a great goal! Let us plan your journey to become a " + s.goal + "!\n\nFirst - what is your age?"; }, placeholder: 'e.g. 18' },
  { key: 'education', ask: "What is your current education level?", placeholder: 'e.g. 12th grade, B.Tech, Graduate...', chips: ['School (10th)', '12th Grade', 'Undergraduate', 'Graduate', 'Self-taught'] },
  { key: 'skills', ask: "What skills do you already have? (even basic ones count!)", placeholder: 'e.g. Python basics, communication, drawing...', chips: ['No skills yet', 'Basic computer skills', 'Some coding', 'Communication', 'Design basics'] },
  { key: 'hoursPerDay', ask: "How many hours can you dedicate to learning every day?", placeholder: 'e.g. 2', chips: ['1 hour', '2 hours', '3 hours', '4+ hours'] }
];
var msgBox = document.getElementById('messages');
var inputEl = document.getElementById('chatInput');
var sendBtn = document.getElementById('sendBtn');
var chipsEl = document.getElementById('chips');
var inputRow = document.getElementById('inputRow');
function scrollBottom() { msgBox.scrollTop = msgBox.scrollHeight; }
function addMsg(text, type, isHtml) {
  type = type || 'ai'; isHtml = isHtml || false;
  var div = document.createElement('div');
  div.className = 'msg ' + type;
  var av = type === 'ai' ? 'AI' : 'You';
  div.innerHTML = '<div class="msg-av">' + av + '</div><div class="msg-bub">' + (isHtml ? text : text.replace(/\n/g, '<br>')) + '</div>';
  msgBox.appendChild(div); scrollBottom(); return div;
}
function addTyping() {
  var div = document.createElement('div');
  div.className = 'msg ai'; div.id = 'typing';
  div.innerHTML = '<div class="msg-av">AI</div><div class="msg-bub"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  msgBox.appendChild(div); scrollBottom();
}
function removeTyping() { var t = document.getElementById('typing'); if (t) t.remove(); }
function setChips(options) {
  chipsEl.innerHTML = '';
  if (!options || !options.length) return;
  options.forEach(function(opt) {
    var btn = document.createElement('button');
    btn.className = 'chip'; btn.textContent = opt;
    btn.onclick = function() { inputEl.value = opt; handleSend(); };
    chipsEl.appendChild(btn);
  });
}
function clearChips() { chipsEl.innerHTML = ''; }
function updateDots(step) {
  for (var i = 0; i < 5; i++) {
    var d = document.getElementById('dot' + i);
    if (!d) continue;
    d.className = 'dot' + (i < step ? ' done' : i === step ? ' active' : '');
  }
}
function setInputVisible(v) { inputRow.style.display = v ? 'flex' : 'none'; }
function delay(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }
async function aiSay(text, isHtml) {
  isHtml = isHtml || false;
  addTyping();
  await delay(700 + Math.min(text.length * 8, 1200));
  removeTyping();
  addMsg(text, 'ai', isHtml);
}
async function init() {
  var urlParams = new URLSearchParams(window.location.search);
  var goalParam = urlParams.get('goal');
  if (goalParam) { state.goal = decodeURIComponent(goalParam).replace(/-/g, ' '); }
  try {
    var res = await fetch(API_URL + '/mentor/progress', { headers: { 'Authorization': 'Bearer ' + token() } });
    if (res.ok) {
      var data = await res.json();
      if (data.goal && data.goalLocked) {
        document.getElementById('alreadyBanner').style.display = 'flex';
        document.getElementById('existingGoal').textContent = data.goal;
        if (!state.goal) state.goal = data.goal;
      }
    }
  } catch (e) {}
  await delay(400);
  if (state.goal) {
    await aiSay('Hey there! I am your AI Mentor.\n\nI see you are interested in: ' + state.goal + '\n\nLet us set this as your goal and plan your journey!');
    await delay(300); await startStep(1);
  } else { await startStep(0); }
}
async function startStep(stepIndex) {
  updateDots(stepIndex); state.step = stepIndex;
  if (stepIndex >= STEPS.length) { await askReport(); return; }
  var step = STEPS[stepIndex];
  var question = typeof step.ask === 'function' ? step.ask(state) : step.ask;
  await aiSay(question);
  inputEl.placeholder = step.placeholder || 'Type your answer...';
  inputEl.value = ''; inputEl.focus();
  setChips(step.chips || []);
  setInputVisible(true); sendBtn.disabled = false;
}
async function handleSend() {
  var val = inputEl.value.trim(); if (!val) return;
  clearChips(); addMsg(val, 'user');
  inputEl.value = ''; sendBtn.disabled = true; setInputVisible(false);
  var step = STEPS[state.step];
  if (step) state[step.key] = val;
  await delay(300); await startStep(state.step + 1);
}
async function askReport() {
  updateDots(4);
  await aiSay('Perfect! Here is what I know about you:\n\nGoal: ' + state.goal + '\nAge: ' + state.age + '\nEducation: ' + state.education + '\nSkills: ' + state.skills + '\nDaily hours: ' + state.hoursPerDay);
  await delay(400);
  await aiSay('Do you want me to generate a complete Career Roadmap and R&D Report for your goal?');
  setChips(['Yes, generate my report!', 'No, skip for now']);
  setInputVisible(false);
  chipsEl.querySelectorAll('.chip').forEach(function(btn) {
    btn.onclick = async function() {
      var choice = btn.textContent; clearChips(); addMsg(choice, 'user');
      state.wantsReport = choice.startsWith('Yes');
      await delay(300); await askConfirm();
    };
  });
}
async function askConfirm() {
  if (state.wantsReport) await aiSay('Generating your personalized report... This may take a moment');
  var reportText = null;
  try {
    var res = await fetch(API_URL + '/mentor/onboard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() },
      body: JSON.stringify({ goal: state.goal, age: state.age, education: state.education, skills: state.skills, hoursPerDay: state.hoursPerDay, wantsReport: state.wantsReport })
    });
    var data = await res.json();
    if (data.report) reportText = data.report;
  } catch (e) {}
  if (reportText) {
    addMsg('<div style="font-weight:700;margin-bottom:8px;color:#a78bfa">Your Career R&D Report</div><div class="report-card">' + reportText.replace(/\n/g,'<br>') + '</div>', 'ai', true);
    scrollBottom(); await delay(600);
  }
  await aiSay('Do you want to fix this goal as your main ambition?\n\n"' + state.goal + '"\n\nOnce confirmed, your AI Mentor will activate and generate daily tasks for you!');
  setChips(['Yes, lock my goal!', 'No, let me change it']);
  setInputVisible(false);
  chipsEl.querySelectorAll('.chip').forEach(function(btn) {
    btn.onclick = async function() {
      var choice = btn.textContent; clearChips(); addMsg(choice, 'user');
      await delay(300);
      if (choice.startsWith('Yes')) {
        await lockAndFinish();
      } else {
        await aiSay('No problem! What would you like your goal to be instead?');
        state.step = 0; inputEl.placeholder = 'Enter your new goal...';
        inputEl.value = ''; setInputVisible(true); sendBtn.disabled = false; inputEl.focus();
        sendBtn.onclick = async function() {
          var val = inputEl.value.trim(); if (!val) return;
          clearChips(); addMsg(val, 'user'); state.goal = val;
          inputEl.value = ''; sendBtn.disabled = true; setInputVisible(false);
          sendBtn.onclick = handleSend;
          await delay(300); await askReport();
        };
      }
    };
  });
}
async function lockAndFinish() {
  try {
    await fetch(API_URL + '/mentor/lock-goal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() },
      body: JSON.stringify({ goal: state.goal })
    });
  } catch (e) {}
  try {
    var u = JSON.parse(localStorage.getItem('user') || '{}');
    u.goal = state.goal; u.ambition = state.goal;
    localStorage.setItem('user', JSON.stringify(u));
  } catch (e) {}
  updateDots(5);
  await aiSay('Goal locked! Welcome to your AI Mentor journey!\n\nI will generate your daily tasks, timetable, and guide you every step of the way.\n\nRedirecting to your Mentor Dashboard...');
  try {
    await fetch(API_URL + '/mentor/generate-tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token() },
      body: JSON.stringify({ goal: state.goal })
    });
  } catch (e) {}
  await delay(2200);
  window.location.href = 'mentor.html';
}
inputEl.addEventListener('keypress', function(e) { if (e.key === 'Enter') handleSend(); });
init();
</script>
</body>
</html>
