<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode - Dream Wave</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0a0f;color:#e2e8f0;font-family:'Inter',-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background 0.5s;}
    body.active-focus{background:#050508;}
    .exit-btn{position:fixed;top:20px;left:20px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);padding:8px 16px;border-radius:10px;cursor:pointer;font-size:0.85rem;text-decoration:none;transition:all 0.2s;}
    .exit-btn:hover{color:#fff;background:rgba(255,255,255,0.1);}
    .focus-wrap{text-align:center;max-width:480px;padding:20px;}
    .focus-label{font-size:0.75rem;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;}
    .timer-ring{position:relative;width:260px;height:260px;margin:0 auto 32px;}
    .timer-ring svg{transform:rotate(-90deg);}
    .ring-bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:8;}
    .ring-fill{fill:none;stroke:url(#ringGrad);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 1s linear;}
    .timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
    .timer-num{font-size:3.2rem;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#7c3aed,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .timer-phase{font-size:0.78rem;color:rgba(255,255,255,0.35);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
    .controls{display:flex;gap:12px;justify-content:center;margin-bottom:32px;}
    .ctrl-btn{padding:12px 28px;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
    .btn-start{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:white;}
    .btn-start:hover{opacity:0.9;transform:translateY(-1px);}
    .btn-reset{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1);}
    .btn-reset:hover{background:rgba(255,255,255,0.1);color:#fff;}
    .presets{display:flex;gap:8px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
    .preset{padding:7px 16px;border:1px solid rgba(255,255,255,0.1);border-radius:20px;background:transparent;color:rgba(255,255,255,0.4);font-size:0.82rem;cursor:pointer;transition:all 0.2s;}
    .preset:hover,.preset.active{border-color:#a78bfa;color:#a78bfa;background:rgba(124,58,237,0.1);}
    .task-input{width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;color:#fff;padding:12px 16px;font-size:0.9rem;outline:none;text-align:center;margin-bottom:20px;}
    .task-input:focus{border-color:rgba(124,58,237,0.4);}
    .task-input::placeholder{color:rgba(255,255,255,0.2);}
    .session-count{font-size:0.8rem;color:rgba(255,255,255,0.25);margin-top:8px;}
    .session-dots{display:flex;gap:6px;justify-content:center;margin-top:8px;}
    .sdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.1);}
    .sdot.done{background:#a78bfa;}
    .ambient-msg{font-size:0.88rem;color:rgba(255,255,255,0.2);margin-top:24px;font-style:italic;min-height:20px;}
  </style>
</head>
<body>
  <a href="dashboard.html" class="exit-btn">← Exit Focus</a>

  <div class="focus-wrap">
    <div class="focus-label">🎯 Focus Mode</div>

    <input class="task-input" type="text" id="taskInput" placeholder="What are you working on?">

    <div class="presets">
      <button class="preset active" onclick="setPreset(25,5,this)">25 / 5</button>
      <button class="preset" onclick="setPreset(50,10,this)">50 / 10</button>
      <button class="preset" onclick="setPreset(90,15,this)">90 / 15</button>
      <button class="preset" onclick="setPreset(15,5,this)">Quick 15</button>
    </div>

    <div class="timer-ring">
      <svg width="260" height="260" viewBox="0 0 260 260">
        <defs>
          <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#7c3aed"/>
            <stop offset="100%" style="stop-color:#a78bfa"/>
          </linearGradient>
        </defs>
        <circle class="ring-bg" cx="130" cy="130" r="118"/>
        <circle class="ring-fill" id="ringFill" cx="130" cy="130" r="118" stroke-dasharray="741.4" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text">
        <div class="timer-num" id="timerDisplay">25:00</div>
        <div class="timer-phase" id="timerPhase">Ready</div>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn btn-start" id="startBtn" onclick="toggleTimer()">▶ Start</button>
      <button class="ctrl-btn btn-reset" onclick="resetTimer()">↺ Reset</button>
    </div>

    <div class="session-dots" id="sessionDots">
      <div class="sdot"></div><div class="sdot"></div><div class="sdot"></div><div class="sdot"></div>
    </div>
    <div class="session-count" id="sessionCount">Session 0 / 4</div>

    <div class="ambient-msg" id="ambientMsg">Stay present. One task at a time.</div>
  </div>

  <script>
    const MESSAGES = [
      'Stay present. One task at a time.',
      'Deep work creates deep results.',
      'Discipline is freedom.',
      'The mind is sharpest in silence.',
      'Every minute of focus is a brick in your future.',
      'Ancient wisdom: do one thing, do it fully.',
      'You are building something great.',
      'Breathe. Focus. Execute.',
    ];

    let workMins = 25, breakMins = 5;
    let totalSecs, remaining, interval, running = false, isBreak = false, sessions = 0;
    const CIRCUMFERENCE = 741.4;

    function setPreset(w, b, btn) {
      workMins = w; breakMins = b;
      document.querySelectorAll('.preset').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      resetTimer();
    }

    function init() {
      totalSecs = (isBreak ? breakMins : workMins) * 60;
      remaining = totalSecs;
      updateDisplay();
      document.getElementById('timerPhase').textContent = isBreak ? 'Break' : 'Focus';
    }

    function updateDisplay() {
      const m = Math.floor(remaining / 60).toString().padStart(2, '0');
      const s = (remaining % 60).toString().padStart(2, '0');
      document.getElementById('timerDisplay').textContent = m + ':' + s;
      const pct = remaining / totalSecs;
      document.getElementById('ringFill').style.strokeDashoffset = CIRCUMFERENCE * pct;
    }

    function toggleTimer() {
      if (running) {
        clearInterval(interval); running = false;
        document.getElementById('startBtn').textContent = '▶ Resume';
        document.getElementById('timerPhase').textContent = 'Paused';
        document.body.classList.remove('active-focus');
      } else {
        running = true;
        document.getElementById('startBtn').textContent = '⏸ Pause';
        document.getElementById('timerPhase').textContent = isBreak ? 'Break' : 'Focus';
        document.body.classList.add('active-focus');
        rotateMessage();
        interval = setInterval(() => {
          remaining--;
          updateDisplay();
          if (remaining <= 0) {
            clearInterval(interval); running = false;
            if (!isBreak) {
              sessions++;
              updateDots();
              document.getElementById('sessionCount').textContent = 'Session ' + sessions + ' / 4';
              if (sessions % 4 === 0) { alert('Great work! Take a long break.'); sessions = 0; updateDots(); }
              else { alert('Focus session done! Take a ' + breakMins + '-min break.'); }
              isBreak = true;
            } else {
              alert('Break over! Back to focus.');
              isBreak = false;
            }
            init();
            document.getElementById('startBtn').textContent = '▶ Start';
            document.body.classList.remove('active-focus');
          }
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(interval); running = false; isBreak = false;
      document.getElementById('startBtn').textContent = '▶ Start';
      document.body.classList.remove('active-focus');
      init();
    }

    function updateDots() {
      const dots = document.querySelectorAll('.sdot');
      dots.forEach((d, i) => d.classList.toggle('done', i < (sessions % 4 || (sessions > 0 ? 4 : 0))));
    }

    let msgIdx = 0;
    function rotateMessage() {
      const el = document.getElementById('ambientMsg');
      el.textContent = MESSAGES[msgIdx % MESSAGES.length];
      msgIdx++;
    }

    init();
  </script>
</body>
</html>
