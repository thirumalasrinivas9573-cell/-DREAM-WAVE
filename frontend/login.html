<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Dream Wave</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-brand">🌊 Dream Wave</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Login to continue your learning journey</p>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" required placeholder="your@email.com">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>

        <div id="errorMessage" class="error-message"></div>

        <button type="submit" class="btn-primary btn-full">Login</button>

        <p style="text-align:center;margin-top:15px">
          <a href="forgot-password.html" style="color:#667eea;text-decoration:none">Forgot Password?</a>
        </p>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');
      const btn = e.target.querySelector('button[type="submit"]');

      errorDiv.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch(API_URL + '/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = 'dashboard.html';
        } else {
          errorDiv.textContent = data.message || 'Login failed';
          errorDiv.style.display = 'block';
        }
      } catch (err) {
        errorDiv.textContent = 'Cannot connect to server. Make sure the backend is running.';
        errorDiv.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
  </script>
</body>
</html>
