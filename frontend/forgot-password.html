<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Dream Wave</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-wrap { width: 100%; max-width: 440px; padding: 20px; }
    .auth-logo { text-align: center; margin-bottom: 30px; }
    .auth-logo a { font-size: 1.8rem; font-weight: 800; color: white; text-decoration: none; }
    .auth-logo span { color: #a78bfa; }
    .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }
    .glass-card h2 { color: #fff; font-size: 1.8rem; font-weight: 700; margin-bottom: 6px; }
    .glass-card .sub { color: rgba(255,255,255,0.55); font-size: 0.95rem; margin-bottom: 30px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; color: rgba(255,255,255,0.7); font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; }
    .field input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: #fff; font-size: 0.95rem; outline: none; transition: border 0.2s; box-sizing: border-box; }
    .field input::placeholder { color: rgba(255,255,255,0.3); }
    .field input:focus { border-color: #a78bfa; background: rgba(167,139,250,0.1); }
    .msg { font-size: 0.85rem; margin-bottom: 16px; padding: 10px 14px; border-radius: 8px; display: none; }
    .msg.success { color: #6ee7b7; background: rgba(110,231,183,0.1); border: 1px solid rgba(110,231,183,0.3); }
    .msg.error { color: #f87171; background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); }
    .btn-auth { width: 100%; padding: 14px; background: linear-gradient(135deg, #7c3aed, #a78bfa); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    .btn-auth:hover { opacity: 0.9; }
    .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-links { text-align: center; margin-top: 20px; }
    .auth-links a { color: #a78bfa; text-decoration: none; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-logo">
      <a href="index.html">🌊 Dream<span>Wave</span></a>
    </div>
    <div class="glass-card">
      <h2>🔐 Reset Password</h2>
      <p class="sub">Enter your email and a new password</p>
      <div id="message" class="msg"></div>
      <form id="resetForm">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="field">
          <label>New Password</label>
          <input type="password" id="newPassword" required placeholder="Min 6 characters" minlength="6">
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" required placeholder="Repeat password" minlength="6">
        </div>
        <button type="submit" class="btn-auth">Reset Password</button>
      </form>
      <div class="auth-links">
        <a href="login.html">← Back to Login</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const msgDiv = document.getElementById('message');
      const btn = e.target.querySelector('button[type="submit"]');
      msgDiv.style.display = 'none';
      if (newPassword !== confirmPassword) {
        msgDiv.textContent = 'Passwords do not match!';
        msgDiv.className = 'msg error'; msgDiv.style.display = 'block'; return;
      }
      btn.disabled = true; btn.textContent = 'Resetting...';
      try {
        const res = await fetch(API_URL + '/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, newPassword })
        });
        const data = await res.json();
        if (res.ok) {
          msgDiv.textContent = 'Password reset! Redirecting to login...';
          msgDiv.className = 'msg success'; msgDiv.style.display = 'block';
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          msgDiv.textContent = data.message || 'Failed to reset password';
          msgDiv.className = 'msg error'; msgDiv.style.display = 'block';
        }
      } catch (err) {
        msgDiv.textContent = 'Error connecting to server.';
        msgDiv.className = 'msg error'; msgDiv.style.display = 'block';
      } finally {
        btn.disabled = false; btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
